<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Comidinhas Anti-iFood</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🍔 Comidinhas Anti-iFood</h1>

<div class="form">

<input id="nome" placeholder="Nome da comida">

<input id="foto" placeholder="Link da foto">

<textarea id="ingredientes" placeholder="Ingredientes (separe por vírgula)"></textarea>

<textarea id="preparo" placeholder="Modo de preparo"></textarea>

<input id="quantidade" placeholder="Quantidade">

<input id="preco" placeholder="Preço caseiro">

<input id="precoIfood" placeholder="Preço no iFood">

<select id="tipo">

<option>Lanche</option>
<option>Doce</option>
<option>Salgado</option>
<option>Bebida</option>

</select>

<button onclick="adicionar()">Adicionar</button>

</div>

<div class="acoes">

<button onclick="sortear()">🎲 Sortear jantar</button>

<h3 id="resultado"></h3>

</div>

<h2>💰 Economia total</h2>

<h3 id="economia"></h3>

<h2>📋 Lista de comidas</h2>

<div id="lista"></div>

<h2>🛒 Lista de mercado</h2>

<div id="mercado"></div>

<script src="script.js"></script>

</body>

</html>
